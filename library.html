<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    :root {
    --primary-color: #0c0c0e;
    --secondary-color: #e8ff47;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0c0c0e; color: white; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--primary-color);
      padding: 4px 12px;
      font-size: 26px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 1px solid #333;
      z-index: 99;
    }

    .nav-logo {
      font-size: 28px;
      font-weight: 600;
      color: var(--secondary-color);
    }
    .nav-logo span {
      color: white;
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
    }

    .nav-tab {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      color: #5a5a68;
      border: none;
      background: transparent;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .nav-tab:hover {
      color: white;
      background: #131316;
    }

    .nav-tab.active {
      background: var(--secondary-color);
      color: black;
      font-weight: 700;
    }
    .profile_pic{ display: flex; justify-content: flex-end;}

    .page { padding: 60px 32px 64px; max-width: 1100px; margin: auto; }
    .page-title {
      font-size: 32px; font-weight: 800;
      padding: 18px 0 12px;
      text-align: center;
      border-bottom: 1px solid #232328; margin-bottom: 16px;
    }

    .gallery-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: #232328; border: 1px solid #232328;
    }
    .gallery-card {
      background: #18181c; padding: 24px; cursor: pointer;
      display: flex; flex-direction: column; gap: 6px;
      border: none; color: white; text-align: left; width: 100%;
    }
    .gallery-card:hover { background: #1e1e24; }
    .card-name { font-size: 18px; font-weight: 700; margin-top: 2px;}
    .card-constraint {font-size: 14; color: #a6a6a6;}
    .card-desc { font-size: 14px; color: #5a5a68; line-height: 1.25; }
    .card-author { font-size: 12px; color: var(--secondary-color); margin-top: auto;}
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
        <a href="index.html" style="text-decoration: none; color: var(--secondary-color);">Game<span>Forge</span></a>
    </div>
    <div class="nav-tabs">
      <a href="myproject.html" class="nav-tab">My Projects</a>
      <a href="gallery.html" class="nav-tab">Gallery</a>
      <a href="library.html" class="nav-tab active">Library</a>
    </div>
    <div class = "profile_pic">
      <img src="toro.jpg" alt="profile" width="35px" height="35px" style="margin-top: 4px; border-radius: 30%;"></div>
  </nav>

  <div class="page">
    <div class="page-title">Library</div>
    <div class="gallery-grid">

      <button class="gallery-card"> <a href="https://github.com/deepdass/retrohorror" style="text-decoration: none; color: inherit;"> 
      <div style=" overflow: hidden;">
      <img src="retro_guide.png" alt="gameimg" style="width: 100%; height: 100%; object-fit: cover;"></div>
      <div class="card-name">Retro Guide</div>
      <div class="card-constraint">PS1 Graphics</div>
      <div class="card-desc">How to recreate the aesthetic of the PlayStation 1 era graphics inside Godot</div>
      </a></button>
    </div> 
  </div>


</body>
</html>
