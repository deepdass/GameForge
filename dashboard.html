<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    :root {
    --primary-color: #0c0c0e;
    --secondary-color: #e8ff47;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0c0c0e; color: white; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--primary-color);
      padding: 8px 12px;
      font-size: 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
      z-index: 99;
    }

    .nav-logo {
      font-size: 28px;
      font-weight: 600;
      color: var(--secondary-color);
    }
    .nav-logo span {
      color: white;
    }

    .nav-tabs {
      display: flex;
      gap: 4;
    }

    .nav-tab {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      color: #5a5a68;
      border: none;
      background: transparent;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .nav-tab:hover {
      color: white;
      background: #131316;
    }

    .nav-tab.active {
      background: var(--secondary-color);
      color: black;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Game<span>Forge</span></div>
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab active">Dashboard</a>
      <a href="gallery.html" class="nav-tab">Gallery</a>
      <a href="library.html" class="nav-tab">Library</a>
    </div>
    <div><img src="toro.jpg" alt="profile" width="35px" height="35px"></div>
  </nav>

</body>
</html>
